# Minimal CI for a Go library.
#
# NOT using the organization's central trunk-based-development template —
# that template builds and pushes Docker images, which doesn't apply to a
# library that ships as source (consumed via `go get`, not deployed). Running
# it here would either fail on a missing Dockerfile or publish a meaningless
# image.
#
# This pipeline just runs `go test ./...` on every push. Default unit tests
# skip the fixture-dependent integration tests (guarded by `integration`
# build tag) — see INTEGRATION_TESTS.md for how to run those locally against
# the SampleExecutionPlan-StoredInMongo fixtures.

stages:
  - test

unit-test:
  stage: test
  image: golang:1.25-alpine
  before_script:
    - apk add --no-cache git
  script:
    - go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
